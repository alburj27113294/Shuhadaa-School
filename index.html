<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة عرض الجدول المدرسي</title>
    <style>
        :root {
            --primary: #4e73df;
            --secondary: #858796;
            --light: #f8f9fc;
            --dark: #5a5c69;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            border-bottom: 2px solid var(--light);
            margin-bottom: 25px;
            padding-bottom: 10px;
        }

        /* تنسيق القوائم المنسدلة */
        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
            background: var(--light);
            padding: 20px;
            border-radius: 10px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        select {
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ddd;
            cursor: pointer;
            background-color: white;
        }

        /* تنسيق الجدول */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            text-align: center;
        }

        th {
            background-color: var(--primary);
            color: white;
            padding: 15px;
            font-size: 16px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            color: var(--dark);
        }

        tr:hover {
            background-color: #f1f4ff;
        }

        .btn-link {
            padding: 8px 15px;
            background-color: #1cc88a;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
        }

        .btn-link:hover {
            background-color: #17a673;
        }

        .status-msg {
            text-align: center;
            padding: 20px;
            color: var(--secondary);
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🗓️ نظام عرض الجداول المدرسية</h1>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>اختر الصف:</label>
            <select id="gradeSelect" onchange="updateTable()">
                <option value="الكل">جميع الصفوف</option>
                <option value="الأول">الأول</option>
                <option value="الثاني">الثاني</option>
                <option value="الثالث">الثالث</option>
                <option value="الرابع">الرابع</option>

            </select>
        </div>
        <div class="control-group">
            <label>اختر اليوم:</label>
            <select id="daySelect" onchange="updateTable()">
                <option value="الأحد">الأحد</option>
                <option value="الأثنين">الأثنين</option>
                <option value="الثلاثاء">الثلاثاء</option>
                <option value="الأربعاء">الأربعاء</option>
                <option value="الخميس">الخميس</option>
            </select>
        </div>
    </div>

    <div class="table-container">
        <table id="scheduleTable">
            <thead>
                <tr>
                    <th>المادة</th>
                    <th>المعلم</th>
                    <th>الصف</th>
                    <th>بداية الحصة</th>
                    <th>نهاية الحصة</th>
                    <th>الرابط</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
        <div id="noData" class="status-msg" style="display:none;">لا توجد حصص مجدولة لهذه الاختيارات.</div>
    </div>
</div>

<script>
    // 1. ضع رابط الـ CSV المباشر هنا
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTGKjAKsWsAxQhBhgf5-8gN9Z5sjeOiYwJgb2Ig3hfNOuLgBpjvovL_MuaO1OSqxgcMFDOL-7H4ljSZ/pub?gid=0&single=true&output=csv';

    let schoolData = [];

    // جلب البيانات من Google Sheet
    async function loadSheetData() {
        try {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            
            // تحويل النص إلى مصفوفة (مع مراعاة الفواصل)
            const rows = data.split('\n').slice(1); // تجاوز السطر الأول (العناوين)
            schoolData = rows.map(row => {
                const columns = row.split(',');
                return {
                    teacher: columns[0]?.trim(),
                    subject: columns[1]?.trim(),
                    grade: columns[2]?.trim(),
                    day: columns[3]?.trim(),
                    start: columns[4]?.trim(),
                    end: columns[5]?.trim(),
                    link: columns[6]?.trim()
                };
            });
            updateTable(); // عرض البيانات لأول مرة
        } catch (error) {
            console.error("خطأ في تحميل البيانات:", error);
            alert("حدث خطأ في الاتصال ببيانات Google Sheets");
        }
    }

    // تصفية وتحديث الجدول
    function updateTable() {
        const selectedGrade = document.getElementById('gradeSelect').value;
        const selectedDay = document.getElementById('daySelect').value;
        const tableBody = document.getElementById('tableBody');
        const noData = document.getElementById('noData');

        tableBody.innerHTML = "";
        
        const filtered = schoolData.filter(item => {
            const gradeMatch = (selectedGrade === "الكل" || item.grade === selectedGrade);
            const dayMatch = (item.day === selectedDay);
            return gradeMatch && dayMatch;
        });

        if (filtered.length === 0) {
            noData.style.display = "block";
            return;
        }

        noData.style.display = "none";
        filtered.forEach(item => {
            if(!item.subject) return; // تخطي السطور الفارغة
            const row = `
                <tr>
                    <td><strong>${item.subject}</strong></td>
                    <td>${item.teacher}</td>
                    <td>${item.grade}</td>
                    <td>${item.start}</td>
                    <td>${item.end}</td>
                    <td><a href="${item.link}" class="btn-link" target="_blank">دخول الحصة</a></td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    }

    // تشغيل الجلب عند فتح الصفحة
    loadSheetData();
</script>

</body>
</html>
